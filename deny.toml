[graph]
all-features = true
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
]

[advisories]
ignore = [
    # Transitive macro helper with no safe upgrade; no project-owned code invokes it directly.
    { id = "RUSTSEC-2024-0436", reason = "paste is transitive and has no safe upgrade; remove when upstream Candle/tokenizers no longer require it" },
    # quick-xml is used by wayland-scanner on trusted protocol XML during the build, not on runtime/user input.
    { id = "RUSTSEC-2026-0194", reason = "wayland-scanner pins quick-xml 0.39; exposure is build-time parsing of trusted protocol XML" },
    { id = "RUSTSEC-2026-0195", reason = "wayland-scanner pins quick-xml 0.39; exposure is build-time parsing of trusted protocol XML" },
    # Slint's current SVG/font stack has no safe upgrade for these unmaintained transitive crates.
    { id = "RUSTSEC-2026-0192", reason = "ttf-parser is transitive through Slint and has no safe upgrade; review with each Slint update" },
    { id = "RUSTSEC-2026-0206", reason = "rustybuzz is transitive through Slint and has no safe upgrade; review with each Slint update" },
]

[bans]
multiple-versions = "warn"
# Workspace-inherited dependencies are reported as wildcards by cargo-deny 0.20 even though their
# versions and paths are centralized in the root manifest and local paths are checked separately.
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[licenses]
confidence-threshold = 0.93
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "LicenseRef-Slint-Royalty-free-2.0",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[licenses.private]
ignore = false

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
