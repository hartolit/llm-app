name: quality

on:
  push:
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust and architecture
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential cmake clang libclang-dev libfontconfig1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev
      - name: Verify committed lockfile
        run: cargo metadata --locked --format-version 1 --no-deps > /dev/null
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Validate architecture
        run: cargo run --locked --bin llm-app -- architecture
      - name: Check workspace targets
        run: cargo check --workspace --all-targets --locked
      - name: Run ordinary tests
        run: cargo test --workspace --locked
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Build API documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked
      - name: Compile benchmarks
        run: cargo bench --workspace --no-run --locked
      - name: Check portable crates for WebAssembly
        run: cargo check --locked --target wasm32-unknown-unknown --lib -p domain-contracts -p tokenization -p context-planner -p sampling -p task-graph
      - name: Check portable crates for embedded no_std
        run: cargo check --locked --target thumbv7em-none-eabihf --lib -p domain-contracts -p tokenization -p context-planner -p sampling -p task-graph
      - name: Report duplicate dependencies
        run: cargo tree -d --locked

  policy:
    name: Dependency and documentation policy
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install pinned policy tools
        run: |
          cargo install cargo-deny --version 0.20.2 --locked
          cargo install lychee --version 0.24.2 --locked
      - name: Check advisories, licenses, sources, and dependency bans
        run: cargo deny --workspace --locked check advisories bans licenses sources
      - name: Check repository-local Markdown links
        run: lychee --config lychee.toml --offline '**/*.md'

  external-links:
    name: External Markdown links
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install pinned link checker
        run: cargo install lychee --version 0.24.2 --locked
      - name: Check external Markdown links
        run: lychee --config lychee.toml '**/*.md'
